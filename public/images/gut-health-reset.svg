<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001418"/>
      <stop offset="100%" style="stop-color:#001e22"/>
    </linearGradient>
    <linearGradient id="dna" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4"/>
      <stop offset="100%" style="stop-color:#006064"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#00BCD433"/>
      <stop offset="100%" style="stop-color:#00BCD400"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="440" fill="url(#bg)"/>
  <!-- Grid -->
  <line x1="0" y1="110" x2="800" y2="110" stroke="#00BCD409" stroke-width="1"/>
  <line x1="0" y1="220" x2="800" y2="220" stroke="#00BCD409" stroke-width="1"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#00BCD409" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="440" stroke="#00BCD409" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="440" stroke="#00BCD409" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="440" stroke="#00BCD409" stroke-width="1"/>
  <!-- Background glow -->
  <ellipse cx="400" cy="210" rx="180" ry="130" fill="#00BCD422" filter="url(#blur)"/>
  <!-- Outer rings -->
  <circle cx="400" cy="210" r="145" fill="none" stroke="#00BCD418" stroke-width="2"/>
  <circle cx="400" cy="210" r="105" fill="none" stroke="#00BCD412" stroke-width="1" stroke-dasharray="8 6"/>
  <!-- DNA helix left strand -->
  <path d="M340 80 Q360 110 340 140 Q320 170 340 200 Q360 230 340 260 Q320 290 340 320 Q360 350 340 370" fill="none" stroke="#00BCD4" stroke-width="3" opacity="0.8"/>
  <!-- DNA helix right strand -->
  <path d="M460 80 Q440 110 460 140 Q480 170 460 200 Q440 230 460 260 Q480 290 460 320 Q440 350 460 370" fill="none" stroke="#00BCD4" stroke-width="3" opacity="0.8"/>
  <!-- Connecting rungs -->
  <line x1="340" y1="100" x2="460" y2="120" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="140" x2="460" y2="120" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="140" x2="460" y2="160" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="180" x2="460" y2="160" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="180" x2="460" y2="200" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="220" x2="460" y2="200" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="220" x2="460" y2="240" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="260" x2="460" y2="240" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="260" x2="460" y2="280" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="300" x2="460" y2="280" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="300" x2="460" y2="320" stroke="#00BCD455" stroke-width="2"/>
  <line x1="340" y1="340" x2="460" y2="320" stroke="#00BCD455" stroke-width="2"/>
  <!-- Node dots -->
  <circle cx="340" cy="100" r="5" fill="#00BCD4"/>
  <circle cx="460" cy="120" r="5" fill="#4DD0E1"/>
  <circle cx="340" cy="180" r="5" fill="#00BCD4"/>
  <circle cx="460" cy="200" r="5" fill="#4DD0E1"/>
  <circle cx="340" cy="260" r="5" fill="#00BCD4"/>
  <circle cx="460" cy="280" r="5" fill="#4DD0E1"/>
  <circle cx="340" cy="340" r="5" fill="#00BCD4"/>
  <!-- Label -->
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00BCD466" letter-spacing="5" font-weight="700">GUT HEALTH RESET</text>
</svg>
