<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0012"/>
      <stop offset="100%" style="stop-color:#180020"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#6A0080"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#9C27B033"/>
      <stop offset="100%" style="stop-color:#9C27B000"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="800" height="440" fill="url(#bg)"/>
  <!-- Grid -->
  <line x1="0" y1="110" x2="800" y2="110" stroke="#9C27B009" stroke-width="1"/>
  <line x1="0" y1="220" x2="800" y2="220" stroke="#9C27B009" stroke-width="1"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#9C27B009" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="440" stroke="#9C27B009" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="440" stroke="#9C27B009" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="440" stroke="#9C27B009" stroke-width="1"/>
  <!-- Glow -->
  <ellipse cx="400" cy="220" rx="200" ry="120" fill="#9C27B022" filter="url(#blur)"/>
  <!-- Barbell bar -->
  <rect x="140" y="210" width="520" height="20" rx="4" fill="url(#bar)"/>
  <!-- Left plates -->
  <rect x="170" y="165" width="22" height="110" rx="4" fill="#7B1FA2" opacity="0.95"/>
  <rect x="198" y="175" width="18" height="90" rx="3" fill="#9C27B0" opacity="0.9"/>
  <rect x="222" y="183" width="14" height="74" rx="3" fill="#AB47BC" opacity="0.85"/>
  <!-- Right plates -->
  <rect x="608" y="165" width="22" height="110" rx="4" fill="#7B1FA2" opacity="0.95"/>
  <rect x="584" y="175" width="18" height="90" rx="3" fill="#9C27B0" opacity="0.9"/>
  <rect x="564" y="183" width="14" height="74" rx="3" fill="#AB47BC" opacity="0.85"/>
  <!-- Center collar rings -->
  <rect x="350" y="200" width="20" height="40" rx="3" fill="#CE93D8"/>
  <rect x="430" y="200" width="20" height="40" rx="3" fill="#CE93D8"/>
  <!-- Glow on bar -->
  <rect x="140" y="213" width="520" height="4" rx="2" fill="#CE93D8" opacity="0.5"/>
  <!-- Label -->
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9C27B066" letter-spacing="5" font-weight="700">STRENGTH FOUNDATIONS</text>
</svg>
